<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шашки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            max-width: 700px;
            width: 100%;
            border: 1px solid #3a3a3a;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .title span {
            color: #e0c080;
        }

        .mode-group {
            display: flex;
            gap: 6px;
            background: #222;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .mode-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: #666;
        }

        .mode-btn:hover {
            color: #aaa;
        }

        .mode-btn.active {
            background: #3a3a3a;
            color: #e0c080;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .status {
            font-size: 15px;
            padding: 12px 20px;
            border-radius: 14px;
            background: #222;
            border: 1px solid #333;
            text-align: center;
            color: #ccc;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .board-wrapper {
            border-radius: 16px;
            padding: 8px;
            background: #222;
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            background: #2a2a2a;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score {
            display: flex;
            gap: 20px;
            color: #aaa;
            font-size: 14px;
            background: #222;
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid #333;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-item .count {
            font-weight: 700;
            font-size: 20px;
            min-width: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .score-item.white .count {
            color: #fff;
        }
        .score-item.black .count {
            color: #888;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #3a3a3a;
            color: #ccc;
        }

        button:hover {
            background: #444;
            color: #fff;
            transform: translateY(-1px);
        }

        button.primary {
            background: #e0c080;
            color: #1a1a1a;
        }

        button.primary:hover {
            background: #e8d090;
            box-shadow: 0 4px 20px rgba(224, 192, 128, 0.2);
        }

        .diff-group {
            display: flex;
            gap: 4px;
            background: #222;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .diff-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: #555;
        }

        .diff-btn:hover {
            color: #888;
        }

        .diff-btn.active {
            background: #3a3a3a;
            color: #e0c080;
        }

        .diff-btn.active.easy {
            background: #2a4a2a;
            color: #6aaa6a;
        }
        .diff-btn.active.medium {
            background: #4a4a2a;
            color: #caca6a;
        }
        .diff-btn.active.hard {
            background: #4a2a2a;
            color: #ca6a6a;
        }
        .diff-btn.active.expert {
            background: #3a2a4a;
            color: #aa6aca;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .turn-indicator {
            font-size: 13px;
            color: #666;
            padding: 8px 16px;
            background: #222;
            border-radius: 12px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .turn-indicator.highlight {
            color: #e0c080;
            border-color: #e0c080;
            box-shadow: 0 0 20px rgba(224, 192, 128, 0.05);
        }

        .options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            font-size: 12px;
            padding: 6px 14px;
            background: #222;
            border-radius: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-label:hover {
            border-color: #555;
            color: #888;
        }

        .option-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #e0c080;
        }

        .color-group {
            display: flex;
            gap: 4px;
            background: #222;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .color-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: #555;
        }

        .color-btn:hover {
            color: #888;
        }

        .color-btn.active-white {
            background: #3a3a3a;
            color: #fff;
        }

        .color-btn.active-black {
            background: #3a3a3a;
            color: #888;
        }

        .bot-status {
            font-size: 12px;
            color: #444;
            text-align: center;
            margin-top: 8px;
            padding: 6px;
            border-radius: 8px;
            background: #222;
            transition: all 0.3s ease;
        }

        .bot-status.active {
            color: #e0c080;
        }

        .qr-btn {
            background: transparent;
            color: #888;
            padding: 8px 12px;
            font-size: 18px;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .qr-btn:hover {
            background: #333;
            color: #e0c080;
            border-color: #e0c080;
        }

        /* Модальное окно для QR */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            border: 1px solid #3a3a3a;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .modal-content p {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-content #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px auto 20px;
            padding: 20px;
            background: #fff;
            border-radius: 16px;
            min-height: 200px;
            min-width: 200px;
        }

        .modal-content .qr-url {
            color: #888;
            font-size: 13px;
            word-break: break-all;
            background: #222;
            padding: 12px 16px;
            border-radius: 10px;
            margin: 10px 0 16px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .modal-content .qr-url a {
            color: #e0c080;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .modal-content .qr-url a:hover {
            color: #f0d090;
            text-decoration: underline;
        }

        .modal-content .qr-url .copy-btn {
            background: transparent;
            color: #666;
            border: 1px solid #444;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .modal-content .qr-url .copy-btn:hover {
            background: #333;
            color: #fff;
            border-color: #e0c080;
        }

        .modal-content .close-btn {
            background: #e0c080;
            color: #1a1a1a;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-content .close-btn:hover {
            background: #e8d090;
            transform: scale(1.02);
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 16px;
            }
            .title {
                font-size: 20px;
            }
            .mode-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            .score {
                font-size: 12px;
                padding: 8px 14px;
            }
            button {
                font-size: 11px;
                padding: 8px 14px;
            }
            .diff-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
            .modal-content {
                padding: 24px;
            }
            .modal-content #qrcode {
                min-height: 150px;
                min-width: 150px;
                padding: 15px;
            }
            .modal-content .qr-url {
                font-size: 11px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .pulsing {
            animation: pulse 0.8s ease-in-out 3;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">♛ <span>Шашки</span></div>
            <div class="mode-group">
                <button class="mode-btn active" data-mode="pvp" onclick="setMode('pvp')">1 на 1</button>
                <button class="mode-btn" data-mode="pve" onclick="setMode('pve')">Бот</button>
            </div>
        </div>

        <div class="status" id="status">Ход белых</div>

        <div class="board-wrapper">
            <canvas id="board" width="600" height="600"></canvas>
        </div>

        <div class="info-panel">
            <div class="score">
                <div class="score-item white">⚪ <span class="count" id="whiteScore">12</span></div>
                <div class="score-item black">⚫ <span class="count" id="blackScore">12</span></div>
            </div>
            <div class="controls">
                <button class="primary" onclick="restartGame()">Новая игра</button>
                <button onclick="undoMove()">↩ Отмена</button>
                <button class="qr-btn" onclick="showQR()" title="QR-код для входа">📱</button>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="turn-indicator" id="turnIndicator">⚪ Ход белых</div>
            <div class="options">
                <div class="diff-group" id="diffGroup" style="display:none;">
                    <button class="diff-btn easy" data-diff="easy" onclick="setDifficulty('easy')">Лёгкий</button>
                    <button class="diff-btn medium active" data-diff="medium" onclick="setDifficulty('medium')">Средний</button>
                    <button class="diff-btn hard" data-diff="hard" onclick="setDifficulty('hard')">Сложный</button>
                    <button class="diff-btn expert" data-diff="expert" onclick="setDifficulty('expert')">Эксперт</button>
                </div>
                <div class="color-group">
                    <button class="color-btn active-white" data-color="white" onclick="selectColor('white')">⚪</button>
                    <button class="color-btn" data-color="black" onclick="selectColor('black')">⚫</button>
                </div>
                <label class="option-label">
                    <input type="checkbox" id="mandatoryCapture" checked onchange="toggleMandatoryCapture()">
                    Взятие
                </label>
            </div>
        </div>
        <div class="bot-status" id="botStatus"></div>
    </div>

    <!-- Модальное окно с QR-кодом -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <h2>📱 QR-код для входа</h2>
            <p>Отсканируйте QR-код или перейдите по ссылке</p>
            <div id="qrcode"></div>
            <div class="qr-url">
                <a href="#" id="qrLink" target="_blank">Открыть игру</a>
                <button class="copy-btn" onclick="copyUrl()">📋 Копировать</button>
            </div>
            <button class="close-btn" onclick="closeQR()">Закрыть</button>
        </div>
    </div>

    <!-- Подключаем библиотеку для генерации QR-кода -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
    </script>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const SIZE = 600;
        const CELL = SIZE / 8;
        const RADIUS = CELL * 0.42;

        let board = [];
        let currentPlayer = 'white';
        let selected = null;
        let validMoves = [];
        let gameOver = false;
        let history = [];
        let isBotThinking = false;
        let gameMode = 'pvp';
        let difficulty = 'medium';
        let mandatoryCapture = true;
        let playerColor = 'white';
        let botColor = 'black';
        let lastMove = null;
        let highlightedSquares = [];
        let qrCodeInstance = null;

        function initBoard() {
            board = [];
            for (let r = 0; r < 8; r++) {
                board[r] = [];
                for (let c = 0; c < 8; c++) {
                    if ((r + c) % 2 === 1) {
                        if (r < 3) board[r][c] = { color: 'black', king: false };
                        else if (r > 4) board[r][c] = { color: 'white', king: false };
                        else board[r][c] = null;
                    } else {
                        board[r][c] = null;
                    }
                }
            }
            lastMove = null;
            highlightedSquares = [];
        }

        function copyBoard(b) {
            return b.map(row => row.map(cell => cell ? { ...cell } : null));
        }

        function getMoves(b, color) {
            const moves = [];
            const mandatory = [];

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = b[r][c];
                    if (!piece || piece.color !== color) continue;

                    const dirs = piece.king ? [-1, 1] : (color === 'white' ? [-1] : [1]);

                    for (const dr of dirs) {
                        for (const dc of [-1, 1]) {
                            const nr = r + dr,
                                nc = c + dc;
                            if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;

                            if (!b[nr][nc]) {
                                if (!mandatoryCapture || mandatory.length === 0) {
                                    moves.push({ from: { r, c }, to: { r: nr, c: nc }, captured: null, king: false });
                                }
                            } else if (b[nr][nc].color !== color) {
                                const jr = nr + dr,
                                    jc = nc + dc;
                                if (jr >= 0 && jr <= 7 && jc >= 0 && jc <= 7 && !b[jr][jc]) {
                                    const m = { from: { r, c }, to: { r: jr, c: jc }, captured: { r: nr, c: nc },
                                        king: false };
                                    moves.push(m);
                                    mandatory.push(m);
                                }
                            }
                        }
                    }
                }
            }

            const result = (mandatoryCapture && mandatory.length > 0) ? mandatory : moves;

            for (const m of result) {
                const p = b[m.from.r][m.from.c];
                if (!p.king) {
                    if (p.color === 'white' && m.to.r === 0) m.king = true;
                    if (p.color === 'black' && m.to.r === 7) m.king = true;
                }
            }

            return result;
        }

        function makeMove(b, move) {
            const nb = copyBoard(b);
            const piece = nb[move.from.r][move.from.c];
            nb[move.to.r][move.to.c] = { ...piece };
            if (move.king) nb[move.to.r][move.to.c].king = true;
            nb[move.from.r][move.from.c] = null;
            if (move.captured) nb[move.captured.r][move.captured.c] = null;
            return nb;
        }

        function evaluate(b) {
            let score = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = b[r][c];
                    if (p) {
                        const val = p.king ? 3 : 1;
                        score += p.color === 'white' ? val : -val;
                    }
                }
            }
            return score;
        }

        function minimax(b, depth, alpha, beta, isMax, origColor, maxDepth) {
            const color = isMax ? 'white' : 'black';
            const moves = getMoves(b, color);
            if (moves.length === 0 || depth === 0) {
                return { score: evaluate(b) * (origColor === 'white' ? 1 : -1) };
            }
            if (maxDepth === 2 && depth === maxDepth && Math.random() < 0.35) {
                const rm = moves[Math.floor(Math.random() * moves.length)];
                return { score: 0, move: rm };
            }
            let best = moves[0];
            if (isMax) {
                let maxEval = -Infinity;
                for (const m of moves) {
                    const nb = makeMove(b, m);
                    const r = minimax(nb, depth - 1, alpha, beta, false, origColor, maxDepth);
                    if (r.score > maxEval) { maxEval = r.score;
                        best = m; }
                    alpha = Math.max(alpha, maxEval);
                    if (beta <= alpha) break;
                }
                return { score: maxEval, move: best };
            } else {
                let minEval = Infinity;
                for (const m of moves) {
                    const nb = makeMove(b, m);
                    const r = minimax(nb, depth - 1, alpha, beta, true, origColor, maxDepth);
                    if (r.score < minEval) { minEval = r.score;
                        best = m; }
                    beta = Math.min(beta, minEval);
                    if (beta <= alpha) break;
                }
                return { score: minEval, move: best };
            }
        }

        function getDepth() {
            switch (difficulty) {
                case 'easy':
                    return 2;
                case 'medium':
                    return 4;
                case 'hard':
                    return 6;
                case 'expert':
                    return 8;
                default:
                    return 4;
            }
        }

        function getDiffName() {
            switch (difficulty) {
                case 'easy':
                    return 'Лёгкий';
                case 'medium':
                    return 'Средний';
                case 'hard':
                    return 'Сложный';
                case 'expert':
                    return 'Эксперт';
                default:
                    return 'Средний';
            }
        }

        function drawPiece(x, y, piece, highlight) {
            const isWhite = piece.color === 'white';

            ctx.save();

            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 3;

            if (highlight) {
                ctx.shadowColor = 'rgba(224,192,128,0.6)';
                ctx.shadowBlur = 25;
            }

            const grad = ctx.createRadialGradient(x - RADIUS * 0.3, y - RADIUS * 0.3, RADIUS * 0.1, x, y, RADIUS);
            if (isWhite) {
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.4, '#f0f0f0');
                grad.addColorStop(1, '#c8c8c8');
            } else {
                grad.addColorStop(0, '#555555');
                grad.addColorStop(0.4, '#333333');
                grad.addColorStop(1, '#111111');
            }

            ctx.beginPath();
            ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.shadowBlur = 0;

            ctx.strokeStyle = isWhite ? 'rgba(180,180,180,0.3)' : 'rgba(60,60,60,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            const hl = ctx.createRadialGradient(x - RADIUS * 0.3, y - RADIUS * 0.35, RADIUS * 0.05, x - RADIUS * 0.15, y - RADIUS *
                0.2, RADIUS * 0.7);
            if (isWhite) {
                hl.addColorStop(0, 'rgba(255,255,255,0.8)');
                hl.addColorStop(1, 'rgba(255,255,255,0)');
            } else {
                hl.addColorStop(0, 'rgba(255,255,255,0.3)');
                hl.addColorStop(1, 'rgba(255,255,255,0)');
            }
            ctx.beginPath();
            ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = hl;
            ctx.fill();

            if (piece.king) {
                ctx.shadowColor = 'rgba(224,192,128,0.4)';
                ctx.shadowBlur = 20;
                ctx.font = `${RADIUS * 0.5}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#e0c080';
                ctx.fillText('♛', x, y + 1);
                ctx.shadowBlur = 0;
            }

            ctx.restore();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, SIZE, SIZE);

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const x = c * CELL,
                        y = r * CELL;
                    ctx.fillStyle = (r + c) % 2 === 0 ? '#e8dcc8' : '#b8a090';
                    ctx.fillRect(x, y, CELL, CELL);
                }
            }

            if (lastMove) {
                const fromX = lastMove.from.c * CELL,
                    fromY = lastMove.from.r * CELL;
                const toX = lastMove.to.c * CELL,
                    toY = lastMove.to.r * CELL;

                ctx.fillStyle = 'rgba(255,215,0,0.15)';
                ctx.fillRect(fromX, fromY, CELL, CELL);
                ctx.fillRect(toX, toY, CELL, CELL);

                ctx.strokeStyle = 'rgba(255,215,0,0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([3, 3]);
                ctx.strokeRect(fromX + 2, fromY + 2, CELL - 4, CELL - 4);
                ctx.strokeRect(toX + 2, toY + 2, CELL - 4, CELL - 4);
                ctx.setLineDash([]);
            }

            if (selected) {
                const x = selected.c * CELL,
                    y = selected.r * CELL;
                ctx.fillStyle = 'rgba(224,192,128,0.25)';
                ctx.fillRect(x, y, CELL, CELL);
                ctx.strokeStyle = 'rgba(224,192,128,0.6)';
                ctx.lineWidth = 3;
                ctx.setLineDash([4, 4]);
                ctx.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
                ctx.setLineDash([]);
                ctx.strokeStyle = 'rgba(224,192,128,0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 6]);
                ctx.strokeRect(x + 4, y + 4, CELL - 8, CELL - 8);
                ctx.setLineDash([]);
            }

            for (const m of validMoves) {
                const cx = m.to.c * CELL + CELL / 2,
                    cy = m.to.r * CELL + CELL / 2;

                const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, RADIUS * 0.8);
                glow.addColorStop(0, 'rgba(100,200,100,0.2)');
                glow.addColorStop(1, 'rgba(100,200,100,0)');
                ctx.beginPath();
                ctx.arc(cx, cy, RADIUS * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(cx, cy, RADIUS * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100,200,100,0.5)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(100,200,100,0.3)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(cx, cy, RADIUS * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100,200,100,0.8)';
                ctx.fill();

                const time = Date.now() / 500;
                const pulse = 0.6 + 0.4 * Math.sin(time);
                ctx.beginPath();
                ctx.arc(cx, cy, RADIUS * 0.06 * pulse, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.3 * pulse})`;
                ctx.fill();
            }

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = board[r][c];
                    if (p) {
                        const x = c * CELL + CELL / 2,
                            y = r * CELL + CELL / 2;
                        const isHighlighted = selected && selected.r === r && selected.c === c;
                        drawPiece(x, y, p, isHighlighted);
                    }
                }
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, SIZE, SIZE);
                ctx.fillStyle = '#fff';
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏁', SIZE / 2, SIZE / 2);
            }
        }

        function botMove() {
            if (isBotThinking || gameOver || gameMode !== 'pve') return;
            if (currentPlayer !== botColor) return;

            isBotThinking = true;
            const diffName = getDiffName();
            document.getElementById('status').textContent = `🤖 Бот (${diffName}) думает...`;
            document.getElementById('status').style.color = '#e0c080';
            document.getElementById('botStatus').textContent = `🤖 Ход бота (${diffName})`;
            document.getElementById('botStatus').classList.add('active');

            setTimeout(() => {
                const moves = getMoves(board, botColor);
                if (moves.length === 0) {
                    gameOver = true;
                    document.getElementById('status').textContent = '🏆 Вы победили!';
                    document.getElementById('status').style.color = '#6aaa6a';
                    isBotThinking = false;
                    drawBoard();
                    updateTurnIndicator();
                    return;
                }

                const depth = getDepth();
                const result = minimax(board, depth, -Infinity, Infinity, false, botColor, depth);
                const move = result.move || moves[0];

                history.push({ board: copyBoard(board), move, player: botColor });
                board = makeMove(board, move);
                lastMove = move;

                currentPlayer = playerColor;
                isBotThinking = false;

                const pm = getMoves(board, playerColor);
                if (pm.length === 0) {
                    gameOver = true;
                    document.getElementById('status').textContent = `😔 Бот (${diffName}) выиграл`;
                    document.getElementById('status').style.color = '#ca6a6a';
                    document.getElementById('botStatus').textContent = `😔 Победа бота (${diffName})`;
                } else {
                    document.getElementById('status').textContent = 'Ваш ход';
                    document.getElementById('status').style.color = '#ccc';
                    document.getElementById('botStatus').textContent = `🎯 Ваш ход | Бот: ${diffName}`;
                }

                updateScore();
                drawBoard();
                updateTurnIndicator();
                document.getElementById('botStatus').classList.remove('active');
            }, 350);
        }

        function playerMove(row, col) {
            if (gameOver || isBotThinking) return;
            if (gameMode === 'pve' && currentPlayer !== playerColor) return;

            if (selected && selected.r === row && selected.c === col) {
                selected = null;
                validMoves = [];
                drawBoard();
                return;
            }

            if (!selected) {
                const p = board[row][col];
                if (p && p.color === currentPlayer) {
                    selected = { r: row, c: col };
                    validMoves = getMoves(board, currentPlayer).filter(m => m.from.r === row && m.from.c === col);
                    drawBoard();
                }
                return;
            }

            const move = validMoves.find(m => m.to.r === row && m.to.c === col);
            if (move) {
                history.push({ board: copyBoard(board), move, player: currentPlayer });
                board = makeMove(board, move);
                lastMove = move;
                selected = null;
                validMoves = [];

                const opp = currentPlayer === 'white' ? 'black' : 'white';
                const om = getMoves(board, opp);

                if (om.length === 0) {
                    gameOver = true;
                    document.getElementById('status').textContent = `🏆 ${currentPlayer === 'white' ? 'Белые' : 'Чёрные'} победили!`;
                    document.getElementById('status').style.color = '#6aaa6a';
                    updateScore();
                    drawBoard();
                    updateTurnIndicator();
                    return;
                }

                currentPlayer = opp;
                updateScore();
                drawBoard();
                updateTurnIndicator();

                if (gameMode === 'pve' && currentPlayer === botColor) {
                    setTimeout(() => botMove(), 400);
                }
            } else {
                selected = null;
                validMoves = [];
                drawBoard();
            }
        }

        function updateScore() {
            let w = 0,
                b = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = board[r][c];
                    if (p) {
                        const v = p.king ? 3 : 1;
                        if (p.color === 'white') w += v;
                        else b += v;
                    }
                }
            }
            document.getElementById('whiteScore').textContent = w;
            document.getElementById('blackScore').textContent = b;
        }

        function updateTurnIndicator() {
            const el = document.getElementById('turnIndicator');
            if (gameOver) {
                el.textContent = '🏁 Игра завершена';
                el.classList.remove('highlight');
                return;
            }
            const emoji = currentPlayer === 'white' ? '⚪' : '⚫';
            const name = currentPlayer === 'white' ? 'Белые' : 'Чёрные';
            let player = '';
            if (gameMode === 'pvp') player = ' (Игрок)';
            else player = currentPlayer === playerColor ? ' (Вы)' : ` (Бот: ${getDiffName()})`;
            el.textContent = `${emoji} Ход ${name}${player}`;
            el.classList.add('highlight');
            setTimeout(() => {
                el.classList.remove('highlight');
            }, 300);
        }

        function toggleMandatoryCapture() {
            mandatoryCapture = document.getElementById('mandatoryCapture').checked;
            selected = null;
            validMoves = [];
            drawBoard();
            updateTurnIndicator();
        }

        function selectColor(color) {
            if (isBotThinking) return;
            playerColor = color;
            botColor = color === 'white' ? 'black' : 'white';

            document.querySelectorAll('.color-btn').forEach(b => {
                b.classList.remove('active-white', 'active-black');
                if (b.dataset.color === color) {
                    b.classList.add(color === 'white' ? 'active-white' : 'active-black');
                }
            });

            if (gameMode === 'pve') {
                restartGame();
            }
        }

        function setMode(mode) {
            if (isBotThinking) return;
            gameMode = mode;

            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === mode);
            });

            document.getElementById('diffGroup').style.display = mode === 'pve' ? 'flex' : 'none';

            if (mode === 'pvp') {
                document.getElementById('botStatus').textContent = '';
                document.getElementById('botStatus').classList.remove('active');
            }
            restartGame();
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.diff === diff) {
                    b.classList.add('active');
                }
            });
            if (gameMode === 'pve') {
                document.getElementById('botStatus').textContent = `🎯 Бот: ${getDiffName()}`;
            }
        }

        function restartGame() {
            if (isBotThinking) return;
            initBoard();
            selected = null;
            validMoves = [];
            gameOver = false;
            history = [];
            lastMove = null;

            if (gameMode === 'pve') {
                currentPlayer = playerColor;
                document.getElementById('status').textContent = 'Ваш ход';
                document.getElementById('botStatus').textContent = `🎯 Бот: ${getDiffName()}`;
                document.getElementById('botStatus').classList.add('active');
            } else {
                currentPlayer = 'white';
                document.getElementById('status').textContent = 'Ход белых';
                document.getElementById('botStatus').textContent = '';
                document.getElementById('botStatus').classList.remove('active');
            }
            document.getElementById('status').style.color = '#ccc';
            updateScore();
            drawBoard();
            updateTurnIndicator();
        }

        function undoMove() {
            if (isBotThinking || gameOver) return;
            if (history.length === 0) return;
            const last = history.pop();
            board = last.board;
            currentPlayer = last.player;
            gameOver = false;
            isBotThinking = false;
            selected = null;
            validMoves = [];
            lastMove = null;
            document.getElementById('status').textContent = '↩ Ход отменен';
            document.getElementById('status').style.color = '#e0c080';
            updateScore();
            drawBoard();
            updateTurnIndicator();
            setTimeout(() => {
                if (!gameOver) {
                    document.getElementById('status').textContent = gameMode === 'pvp' ? 'Ход белых' : 'Ваш ход';
                    document.getElementById('status').style.color = '#ccc';
                }
            }, 800);
        }

        // Функции для QR-кода
        function showQR() {
            const modal = document.getElementById('qrModal');
            const qrContainer = document.getElementById('qrcode');
            const url = window.location.href;

            qrContainer.innerHTML = '';

            qrCodeInstance = new QRCode(qrContainer, {
                text: url,
                width: 200,
                height: 200,
                colorDark: "#1a1a1a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Устанавливаем ссылку
            document.getElementById('qrLink').href = url;
            document.getElementById('qrLink').textContent = url.length > 50 ? url.substring(0, 50) + '...' : url;

            modal.classList.add('show');
        }

        function closeQR() {
            document.getElementById('qrModal').classList.remove('show');
        }

        function copyUrl() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = '✅ Скопировано!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.textContent;
                btn.textContent = '✅ Скопировано!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQR();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeQR();
            }
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const row = Math.floor(y / CELL);
            const col = Math.floor(x / CELL);
            if (row >= 0 && row < 8 && col >= 0 && col < 8) {
                playerMove(row, col);
            }
        });

        function animate() {
            if (!gameOver && validMoves.length > 0) {
                drawBoard();
            }
            requestAnimationFrame(animate);
        }

        initBoard();
        updateScore();
        drawBoard();
        updateTurnIndicator();
        animate();
    </script>
</body>
</html>
