<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор QR-кода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #3a3a3a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            min-height: 250px;
            min-width: 250px;
            max-width: 300px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .url-box {
            background: #222;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            margin: 15px 0;
            word-break: break-all;
            color: #888;
            font-size: 13px;
        }

        .url-box a {
            color: #e0c080;
            text-decoration: none;
            font-weight: 600;
        }

        .url-box a:hover {
            text-decoration: underline;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #e0c080;
            color: #1a1a1a;
            margin: 5px;
        }

        button:hover {
            background: #e8d090;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(224, 192, 128, 0.3);
        }

        button.secondary {
            background: #3a3a3a;
            color: #ccc;
        }

        button.secondary:hover {
            background: #444;
            color: #fff;
        }

        .copy-success {
            color: #6aaa6a;
            font-size: 13px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .copy-success.show {
            opacity: 1;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: #e0c080;
        }

        .input-group input::placeholder {
            color: #555;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }
            #qrcode {
                min-height: 200px;
                min-width: 200px;
                padding: 20px;
            }
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR-код</h1>
        <p>Ссылка для входа в игру</p>

        <!-- Поле для ввода ссылки -->
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Введите ссылку..." value="https://ваш-сайт.com">
            <button onclick="generateQR()">Сгенерировать</button>
        </div>

        <!-- QR-код -->
        <div id="qrcode"></div>

        <!-- Ссылка -->
        <div class="url-box">
            <a href="#" id="qrLink" target="_blank">https://ваш-сайт.com</a>
        </div>

        <!-- Кнопки -->
        <div>
            <button onclick="copyUrl()">📋 Копировать ссылку</button>
            <button onclick="downloadQR()" class="secondary">💾 Скачать QR</button>
        </div>

        <div class="copy-success" id="copySuccess">✅ Ссылка скопирована!</div>
    </div>

    <!-- Подключаем библиотеку QRCode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
    </script>

    <script>
        let qrCodeInstance = null;

        // Генерация QR-кода
        function generateQR() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim() || 'https://ваш-сайт.com';
            const qrContainer = document.getElementById('qrcode');

            // Очищаем контейнер
            qrContainer.innerHTML = '';

            // Создаем QR-код
            qrCodeInstance = new QRCode(qrContainer, {
                text: url,
                width: 250,
                height: 250,
                colorDark: "#1a1a1a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Обновляем ссылку
            document.getElementById('qrLink').href = url;
            document.getElementById('qrLink').textContent = url;

            // Скрываем сообщение о копировании
            document.getElementById('copySuccess').classList.remove('show');
        }

        // Копирование ссылки
        function copyUrl() {
            const url = document.getElementById('urlInput').value || 'https://ваш-сайт.com';

            navigator.clipboard.writeText(url).then(() => {
                showCopySuccess();
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showCopySuccess();
            });
        }

        function showCopySuccess() {
            const el = document.getElementById('copySuccess');
            el.classList.add('show');
            setTimeout(() => {
                el.classList.remove('show');
            }, 2000);
        }

        // Скачивание QR-кода
        function downloadQR() {
            const qrContainer = document.getElementById('qrcode');
            const canvas = qrContainer.querySelector('canvas');

            if (canvas) {
                // Создаем ссылку для скачивания
                const link = document.createElement('a');
                link.download = 'qr-code.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else {
                alert('Сначала сгенерируйте QR-код!');
            }
        }

        // Генерируем при загрузке
        window.onload = function() {
            generateQR();
        };
    </script>
</body>
</html>
